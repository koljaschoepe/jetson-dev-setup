# Jetson Dev — tmux Konfiguration
# Prefix: Ctrl-a (statt Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Allgemein
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
set -sg escape-time 0
set -g default-terminal "screen-256color"
set -g renumber-windows on
set -g focus-events on

# Panes teilen (aktueller Pfad)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane-Größe ändern
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Config neu laden
bind r source-file ~/.tmux.conf \; display "Config neu geladen!"

# Status-Bar
set -g status-style bg=colour235,fg=colour136
set -g status-left-length 30
set -g status-left '#[fg=green,bold]#H #[fg=colour240]| '
set -g status-right '#[fg=cyan]#{?#{==:#{pane_current_command},claude},AI ,}#[fg=yellow]%H:%M #[fg=colour240]| #[fg=magenta]#{pane_current_path} '
set -g status-right-length 80

# Fenster-Status
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=colour166,bold] #I:#W '

# Pane-Rahmen
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour166

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# TPM initialisieren (am Ende lassen)
run -b '~/.tmux/plugins/tpm/tpm'
